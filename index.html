<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nelogica | RA Dashboard (Microsoft Lists)</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Mantendo o seu estilo visual Dark de alta qualidade */
        :root {
            --bg:#0b0f1a; --surface:#131929; --surface2:#1a2236; --border:rgba(255,255,255,0.07);
            --accent:#3d7fff; --accent2:#00e5c3; --danger:#ff4d6d; --warning:#ffb930; --success:#00e5c3;
            --text:#e8edf5; --muted:#6b7a99;
        }
        /* ... (O restante do seu CSS permanece o mesmo) ... */
        .login-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .btn-login { padding:12px 24px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <h2 style="margin-bottom:20px">RA Dashboard</h2>
    <button class="btn-login" onclick="signIn()">Entrar com conta Nelogica</button>
</div>

<script>
// ─── CONFIGURAÇÃO MICROSOFT ──────────────────────────────────────────────────
const msalConfig = {
    auth: {
        clientId: "e18ed5be-1654-4c1a-b883-94aa014267ab", // Seu Client ID
        authority: "https://login.microsoftonline.com/c464c88d-4de9-46bf-88e9-78839bfe32d7", // Seu Tenant ID
        redirectUri: "https://antonyfreitas.github.io/NELOGICA-RA-Dashboard/"
    },
    cache: { cacheLocation: "sessionStorage" }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);
const request = { scopes: ["Sites.ReadWrite.All"] };

// Configuração da Lista (Baseado no seu link)
const SITE_ID = "nelogica-my.sharepoint.com"; 
const LIST_NAME = "reclame_aqui";

async function signIn() {
    try {
        await msalInstance.loginPopup(request);
        document.getElementById('loginScreen').style.display = 'none';
        await carregarDados();
    } catch (err) { console.error(err); }
}

async function getAccessToken() {
    const account = msalInstance.getAllAccounts()[0];
    const response = await msalInstance.acquireTokenSilent({ ...request, account });
    return response.accessToken;
}

// ─── FUNÇÕES DE DADOS (GRAPH API) ───────────────────────────────────────────
async function carregarDados() {
    const token = await getAccessToken();
    // Endpoint para buscar itens da sua lista pessoal
    const url = `https://graph.microsoft.com/v1.0/me/lists/${LIST_NAME}/items?expand=fields`;
    
    try {
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        const records = data.value.map(item => ({
            id: item.id,
            ...item.fields
        }));
        
        // Aqui chamamos suas funções de renderização de gráficos que já existem
        renderizarDashboard(records); 
    } catch (err) {
        console.error("Erro ao carregar lista:", err);
    }
}

async function adicionarRegistro(campos) {
    const token = await getAccessToken();
    const url = `https://graph.microsoft.com/v1.0/me/lists/${LIST_NAME}/items`;
    
    const body = { fields: campos };
    
    return fetch(url, {
        method: 'POST',
        headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
    });
}

// ... Implementar funções de Editar e Excluir seguindo o padrão Graph API ...
</script>
</body>
</html>
